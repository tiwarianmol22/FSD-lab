<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <script src="script.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 50px; }
        .form-container { background: white; padding: 25px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="submit"] { background-color: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; }
        input[type="submit"]:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration</h2>
    <form onsubmit="return validateForm()">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your full name">

        <label for="email">Email:</label>
        <input type="text" id="email" placeholder="student@example.com">

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Min 6 characters">

        <label for="mobile">Mobile Number:</label>
        <input type="text" id="mobile" placeholder="10-digit number">

        <input type="submit" value="Register">
    </form>
</div>

</body>
</html>
